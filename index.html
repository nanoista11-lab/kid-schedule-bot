<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוז ילדים</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; padding: 1rem; direction: rtl; }
  .container { max-width: 600px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; padding: 1rem 1.25rem; background: white; border-radius: 12px; }
  .header-icon { width: 40px; height: 40px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  h1 { font-size: 18px; font-weight: 600; color: #111; }
  .subtitle { font-size: 13px; color: #666; margin-top: 2px; }
  .card { background: white; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card h2 { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 1rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1/-1; }
  label { font-size: 12px; font-weight: 500; color: #666; }
  input, select, textarea { padding: 9px 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; color: #111; background: #fafafa; width: 100%; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #25D366; background: white; }
  textarea { resize: vertical; min-height: 60px; }
  .add-btn { width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 14px; }
  .add-btn:active { background: #1DAA55; transform: scale(0.98); }
  .add-btn:disabled { background: #aaa; }
  .event-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
  .event-item:last-child { border-bottom: none; padding-bottom: 0; }
  .event-item:first-child { padding-top: 0; }
  .event-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .event-name { font-size: 15px; font-weight: 600; color: #111; }
  .event-meta { font-size: 13px; color: #666; line-height: 1.7; margin-top: 3px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; margin-bottom: 4px; }
  .sport { background: #e8f5e9; color: #2e7d32; }
  .medical { background: #fce4ec; color: #c62828; }
  .birthday { background: #fce4ec; color: #880e4f; }
  .bar_mitzva { background: #ede7f6; color: #4527a0; }
  .bat_mitzva { background: #fce4ec; color: #880e4f; }
  .school { background: #e3f2fd; color: #1565c0; }
  .other { background: #f5f5f5; color: #555; }
  .del-btn { background: none; border: none; color: #bbb; font-size: 20px; cursor: pointer; line-height: 1; padding: 0 4px; }
  .del-btn:hover { color: #e53935; }
  .empty { text-align: center; padding: 2rem; color: #999; font-size: 14px; }
  .tg-tip { background: #e8f4fd; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #1565c0; line-height: 1.6; margin-bottom: 1rem; }
  .tg-tip b { font-weight: 600; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.52 3.66 1.43 5.17L2 22l4.96-1.4A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm5 14.8c-.3-.15-1.74-.86-2.01-.96-.27-.1-.47-.15-.67.15-.2.3-.77.96-.95 1.16-.17.2-.35.22-.65.07-.3-.15-1.27-.47-2.41-1.49-.89-.79-1.49-1.77-1.67-2.07-.17-.3-.02-.46.13-.61.14-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.07-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51-.17 0-.37-.02-.57-.02s-.52.07-.8.37c-.27.3-1.04 1.01-1.04 2.47s1.07 2.87 1.22 3.07c.15.2 2.1 3.2 5.08 4.49.71.31 1.27.49 1.7.63.71.23 1.36.2 1.87.12.57-.08 1.74-.71 1.99-1.4.24-.7.24-1.3.17-1.42-.07-.12-.27-.2-.57-.35z"/></svg>
    </div>
    <div>
      <h1>לוז ילדים</h1>
      <div class="subtitle">ממשק ניהול אירועים</div>
    </div>
  </div>

  <div class="tg-tip">
    <b>🤖 הבוט בטלגרם שלך פעיל!</b><br>
    אירועים שתוסיף כאן יישלחו אוטומטית כתזכורת בטלגרם — יום לפני ב-20:00 ובבוקר האירוע ב-07:00.
  </div>

  <div class="card">
    <h2>➕ הוסף אירוע</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>שם הילד/ה</label>
        <input type="text" id="child" placeholder="למשל: מיה">
      </div>
      <div class="form-group">
        <label>סוג אירוע</label>
        <select id="type">
          <option value="sport">⚽ ספורט / חוג</option>
          <option value="medical">🏥 רפואי</option>
          <option value="birthday">🎂 יום הולדת</option>
          <option value="bar_mitzva">🎩 בר מצווה</option>
          <option value="bat_mitzva">👑 בת מצווה</option>
          <option value="school">🎒 בית ספר</option>
          <option value="other">📌 אחר</option>
        </select>
      </div>
      <div class="form-group">
        <label>תאריך</label>
        <input type="date" id="date">
      </div>
      <div class="form-group">
        <label>שעה</label>
        <input type="time" id="time">
      </div>
      <div class="form-group full">
        <label>מיקום</label>
        <input type="text" id="location" placeholder="למשל: מגרש כדורגל רמת גן">
      </div>
      <div class="form-group">
        <label>מי לוקח?</label>
        <input type="text" id="pickup" placeholder="אבא / אמא">
      </div>
      <div class="form-group">
        <label>מי אוסף?</label>
        <input type="text" id="dropoff" placeholder="אבא / אמא">
      </div>
      <div class="form-group full">
        <label>הערות</label>
        <textarea id="notes" placeholder="ציוד, בגדים, תשלום..."></textarea>
      </div>
    </div>
    <button class="add-btn" id="add-btn" onclick="addEvent()">✅ הוסף אירוע</button>
  </div>

  <div class="card">
    <h2>📅 אירועים קרובים</h2>
    <div id="events-list"><div class="empty">טוען...</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const TYPE_LABELS = { sport:'ספורט / חוג', medical:'רפואי', birthday:'יום הולדת', bar_mitzva:'בר מצווה', bat_mitzva:'בת מצווה', school:'בית ספר', other:'אחר' };

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function loadEvents() {
  try {
    const res = await fetch('/api/events');
    return await res.json();
  } catch(e) {
    return [];
  }
}

async function addEvent() {
  const child = document.getElementById('child').value.trim();
  const date = document.getElementById('date').value;
  if (!child || !date) { alert('נא למלא שם ותאריך'); return; }

  const btn = document.getElementById('add-btn');
  btn.disabled = true;
  btn.textContent = 'שומר...';

  const event = {
    id: Date.now(),
    child,
    date,
    time: document.getElementById('time').value,
    location: document.getElementById('location').value.trim(),
    pickup_by: document.getElementById('pickup').value.trim(),
    dropoff_by: document.getElementById('dropoff').value.trim(),
    notes: document.getElementById('notes').value.trim(),
    type: document.getElementById('type').value
  };

  try {
    const res = await fetch('/api/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(event)
    });
    if (res.ok) {
      ['child','date','time','location','pickup','dropoff','notes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('type').value = 'sport';
      showToast('✅ האירוע נוסף!');
      renderEvents();
    } else {
      alert('שגיאה בשמירה');
    }
  } catch(e) {
    alert('שגיאת תקשורת עם השרת');
  }

  btn.disabled = false;
  btn.textContent = '✅ הוסף אירוע';
}

async function deleteEvent(id) {
  try {
    await fetch('/api/events/' + id, { method: 'DELETE' });
    showToast('🗑 האירוע נמחק');
    renderEvents();
  } catch(e) {
    alert('שגיאה במחיקה');
  }
}

function formatDate(d) {
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

async function renderEvents() {
  const el = document.getElementById('events-list');
  const events = await loadEvents();
  const today = new Date().toISOString().split('T')[0];
  const upcoming = events.filter(e => e.date >= today).sort((a,b) => a.date.localeCompare(b.date));
  if (!upcoming.length) { el.innerHTML = '<div class="empty">אין אירועים קרובים</div>'; return; }
  el.innerHTML = upcoming.map(e => `
    <div class="event-item">
      <div class="event-top">
        <div>
          <span class="badge ${e.type}">${TYPE_LABELS[e.type] || e.type}</span>
          <div class="event-name">${e.child}</div>
        </div>
        <button class="del-btn" onclick="deleteEvent(${e.id})">×</button>
      </div>
      <div class="event-meta">
        📆 ${formatDate(e.date)}${e.time ? ' · ' + e.time : ''}
        ${e.location ? '<br>📍 ' + e.location : ''}
        ${e.pickup_by ? '<br>🚗 לוקח: ' + e.pickup_by : ''}${e.dropoff_by ? ' · 🏠 אוסף: ' + e.dropoff_by : ''}
        ${e.notes ? '<br>📝 ' + e.notes : ''}
      </div>
    </div>
  `).join('');
}

renderEvents();
</script>
</body>
</html>
